services:
  # NOTE: images pinned by digest to freeze the working version chain for the party.
  # Captured 2026-06-20 from the running, verified-healthy stack. See notes.md "Frozen versions".
  mc:
    image: itzg/minecraft-server:latest@sha256:847b459c2bc263fe31838eb0b4e3d321d851b9071d94f658439ec53f2db57e6b
    pull_policy: never
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      EULA: "true"
      TYPE: "VANILLA"
      VERSION: "26.1"
      ONLINE_MODE: "false"
      MOTD: "Truest Survivor"
      RCON_PASSWORD: "${RCON_PASSWORD}"
    ports:
      - "25565:25565"
    volumes:
      - ./data/minecraft:/data

  viaproxy:
    image: ghcr.io/viaversion/viaproxy:latest@sha256:34c8515246b7abce1f0fc73ce33228017bcab087f18debe7cbc58dc554881668
    pull_policy: never
    restart: unless-stopped
    depends_on:
      - mc
    ports:
      - "25568:25568"
    volumes:
      - ./data/viaproxy:/app/run

  geyser:
    build:
      context: .
      dockerfile: geyser.Dockerfile
    restart: unless-stopped
    depends_on:
      - viaproxy
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data/geyser:/data

  backup:
    image: itzg/mc-backup:latest@sha256:5d2c1fb80f4a225927e6ff05305d915ee2866bc320dd999f23373360cf88bd40
    pull_policy: never
    restart: unless-stopped
    depends_on:
      - mc
    environment:
      BACKUP_INTERVAL: "24h"
      RCON_HOST: mc
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      DEST_DIR: /backups
      KEEP_COUNT: "7"
    volumes:
      - ./data/minecraft:/data:ro
      - ./data/backups:/backups
